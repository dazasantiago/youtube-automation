name: CI
on:
  pull_request:
    branches: [main]
    paths:
      - 'code/signals-scraper/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/signals-scraper
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run mypy --strict src/
      - run: uv run pytest -q
